{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h2>로그인</h2>
  <p class="help">출근/퇴근 기록, 스케줄 확인, 요청 관리까지 한 번에 처리합니다.</p>
  <form method="post" class="form-grid">
    <label>아이디</label>
    <input type="text" name="username" required />
    <label>비밀번호</label>
    <input type="password" name="password" required />
    <button type="submit">로그인</button>
  </form>
  <a class="link" href="{{ url_for('register') }}">직원 회원가입</a>
  <p class="help">초기 관리자: admin / admin1234</p>
</section>
{% endblock %}
