{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h2>직원 회원가입</h2>
  <p class="help">가입 후 관리자 승인되면 바로 로그인할 수 있습니다.</p>
  <form method="post" class="form-grid">
    <label>이름</label>
    <input type="text" name="full_name" minlength="2" required />
    <label>아이디</label>
    <input type="text" name="username" minlength="3" required />
    <label>비밀번호</label>
    <input type="password" name="password" minlength="8" required />
    <button type="submit">가입 신청</button>
  </form>
  <p class="help">관리자 승인 후 로그인할 수 있습니다.</p>
</section>
{% endblock %}
